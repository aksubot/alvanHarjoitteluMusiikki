<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alvan musa harjottelu lolololol</title>
    <link rel="stylesheet" href="./index.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    


    <iframe class="iframe"  src="https://www.youtube.com/embed/QGVNsTpyJZY?si=WytWpM4cOJ4nZObn" 



    title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; 
    clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
    referrerpolicy="strict-origin-when-cross-origin"></iframe>

    <button style="margin-top: 20px;" class="randomVideo">Uusi kappale</button>

    <div class="piilotajanayta" style="margin: 20px;">
        <label for="piilota">Piilota video:</label>
        <button id="piilota" name="piilota">Piilota</button>
        <label for="nayta">Näytä video:</label>
        <button id="nayta" name="nayta">Näytä</button>
    </div>

    <div class="aikakausi">
        <h1>Aikakausi:</h1>
        <input type="radio" id="aikakausi1" name="aikakausi" value="aikakausi1">
        <label for="aikakausi1">Keskiaika</label><br>
        <input type="radio" id="aikakausi2" name="aikakausi" value="aikakausi2">
        <label for="aikakausi2">Renessanssi</label><br>
        <input type="radio" id="aikakausi3" name="aikakausi" value="aikakausi3">
        <label for="aikakausi3">Barokki</label><br>
        <input type="radio" id="aikakausi4" name="aikakausi" value="aikakausi4">
        <label for="aikakausi4">Klassisismi</label><br>
        <input type="radio" id="aikakausi5" name="aikakausi" value="aikakausi5">
        <label for="aikakausi5">Romantiikka</label><br>
        <input type="radio" id="aikakausi6" name="aikakausi" value="aikakausi6">
        <label for="aikakausi6">1900-luku</label><br>
    </div>

    <label for="nimi">Nimi:</label>
    <input type="text" id="nimi" name="nimi">

    <label for="säveltäjä">Säveltäjä:</label>
    <input type="text" id="säveltäjä" name="säveltäjä">
    
    <button style="margin-top: 20px;" class="näytäVastaukset">Näytä vastaukset</button>

    <script src="./index.js"></script>
</body>
</html>
